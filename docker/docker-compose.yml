name: tramontane

services:
  redis:
    container_name: tramontane-redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    container_name: tramontane-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app/app
      - ../main.py:/app/main.py
      - ../music:/music
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

  worker:
    container_name: tramontane-worker
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    command: uv run arq app.workers.arq_app.WorkerSettings
    volumes:
      - ../app:/app/app
      - ../main.py:/app/main.py
      - ../music:/music
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  icecast:
    container_name: tramontane-icecast
    image: libretime/icecast:2.4.4
    ports:
      - "8100:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml.template:ro
      - ./icecast/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    env_file: ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "perl", "-MIO::Socket::INET", "-e", "exit(IO::Socket::INET->new('127.0.0.1:8000')?0:1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  liquidsoap:
    container_name: tramontane-liquidsoap
    image: savonet/liquidsoap:v2.4.2
    volumes:
      - ./liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ../music:/music
    command: liquidsoap /etc/liquidsoap/radio.liq
    env_file: ../.env
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy

  web:
    container_name: tramontane-web
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: prod
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - api
