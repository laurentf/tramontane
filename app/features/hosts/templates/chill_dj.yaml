template_id: chill_dj
name:
  en: Chill DJ
  fr: DJ Chill
  es: DJ Chill
description:
  en: >-
    Laid-back DJ spinning smooth vibes. Calm energy, warm tones,
    and seamless transitions between tracks.
  fr: >-
    DJ decontracte aux vibes douces. Energie calme, tons chaleureux
    et transitions fluides entre les morceaux.
  es: >-
    DJ relajado con vibraciones suaves. Energia tranquila, tonos calidos
    y transiciones fluidas entre pistas.
icon: moon-stars

avatar_generation_params:
  leonardo:
    model_id: "de7d3faf-762f-48e0-b3b7-9d0ac3a3fcf3"  # Phoenix 1.0
    preset_style: "DYNAMIC"
    alchemy: true
    guidance_scale: 7

avatar_style_hint: >-
  Portrait of a laid-back DJ in a neon-lit studio. Headphones around neck,
  turntables and vinyl records visible. Purple and blue ambient glow.
  Relaxed confident pose, warm smile.
  Candid portrait photograph, natural lighting, warm tones, high detail.

default_voices:
  elevenlabs:
    female: "d3AXX0BlgJHYFCuH9X88"
    male: "xlVRtVJbKuO2nwbbopa2"
    non-binary: "mActWQg9kibLro6Z2ouY"

general_fields:
  - field_key: gender
    field_type: select
    required: true
    translations:
      en: { label: "Gender" }
      fr: { label: "Genre" }
      es: { label: "Genero" }
    options:
      - value: female
        translations: { en: "Female", fr: "Femme", es: "Femenino" }
      - value: male
        translations: { en: "Male", fr: "Homme", es: "Masculino" }
      - value: non-binary
        translations: { en: "Non-binary", fr: "Non-binaire", es: "No binario" }
  - field_key: tone
    field_type: select
    required: true
    translations:
      en: { label: "Tone" }
      fr: { label: "Ton" }
      es: { label: "Tono" }
    options:
      - value: warm
        translations: { en: "Warm", fr: "Chaleureux", es: "Calido" }
      - value: energetic
        translations: { en: "Energetic", fr: "Energique", es: "Energetico" }
      - value: chill
        translations: { en: "Chill", fr: "Decontracte", es: "Relajado" }
      - value: funny
        translations: { en: "Funny", fr: "Drole", es: "Divertido" }
      - value: mysterious
        translations: { en: "Mysterious", fr: "Mysterieux", es: "Misterioso" }
  - field_key: look
    field_type: textarea
    required: false
    max_length: 200
    translations:
      en: { label: "Look & style", placeholder: "Describe their appearance, clothing, accessories..." }
      fr: { label: "Look & style", placeholder: "Decrivez son apparence, ses vetements, ses accessoires..." }
      es: { label: "Look y estilo", placeholder: "Describe su apariencia, ropa, accesorios..." }
  - field_key: backstory
    field_type: textarea
    required: false
    max_length: 300
    translations:
      en: { label: "Backstory", placeholder: "Where do they come from? What shaped who they are?" }
      fr: { label: "Histoire", placeholder: "D'ou viennent-ils ? Qu'est-ce qui les a faconnes ?" }
      es: { label: "Historia", placeholder: "De donde vienen? Que los forjo?" }

template_fields:
  - field_key: music_genres
    field_type: multi_select
    required: true
    min_select: 1
    max_select: 3
    translations:
      en: { label: "Music genres" }
      fr: { label: "Genres musicaux" }
      es: { label: "Generos musicales" }
    options:
      - value: electronic
        translations: { en: "Electronic", fr: "Electronique", es: "Electronica" }
      - value: ambient
        translations: { en: "Ambient", fr: "Ambient", es: "Ambient" }
      - value: lo-fi
        translations: { en: "Lo-fi", fr: "Lo-fi", es: "Lo-fi" }
      - value: jazz
        translations: { en: "Jazz", fr: "Jazz", es: "Jazz" }
      - value: house
        translations: { en: "House", fr: "House", es: "House" }
      - value: downtempo
        translations: { en: "Downtempo", fr: "Downtempo", es: "Downtempo" }

enrichment_prompt: |
  You are creating a radio host personality profile for a chill DJ
  called '{name}'.

  The user described this host with these attributes:
  {form_data}

  Generate a JSON object with these exact keys:
  - short_summary: A single catchy sentence describing this host (max 100 chars,
    like a tagline).
  - self_description: A first-person self-description (2-3 paragraphs) where the
    host introduces themselves to a new listener. Include their passions, style,
    what makes their show special.
  - avatar_prompt (MUST be under 1500 characters): A detailed visual description
    for Leonardo.ai image generation IN ENGLISH. Use this style hint:
    {avatar_style_hint}

  FORMATTING: Do NOT use markdown emphasis (*text*, **text**). Write plain text only.

  Return ONLY a valid JSON object with these three fields.
